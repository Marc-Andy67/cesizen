services:

  app:
    build:
      context: .
      target: production
    environment:
      APP_ENV: dev
      APP_DEBUG: 1

  database:
    ports:
      - "5432:5432"

  mailer:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - cesizen
