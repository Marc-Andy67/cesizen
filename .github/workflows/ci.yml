name: 🔬 CI — Tests & Qualité

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"

jobs:
  tests:
    name: 🧪 Tests (PHPUnit & Panther)
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    env:
      # PostgreSQL 18 — serverVersion=18 dans l'URL Doctrine
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/cesizen_test?serverVersion=18&charset=utf8"
      APP_ENV: test
      PANTHER_APP_ENV: test
      PANTHER_NO_SANDBOX: 1
      PANTHER_CHROME_ARGUMENTS: "--disable-dev-shm-usage"

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cesizen_test
          # CRITIQUE : PostgreSQL 18 a changé son PGDATA par défaut
          # Sans cette variable, le conteneur peut ne pas démarrer correctement
          # Voir : https://github.com/docker-library/postgres/pull/1259
          PGDATA: /var/lib/postgresql/18/docker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, intl, mbstring, xml, zip
          coverage: pcov

      - name: 📦 Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ env.PHP_VERSION }}-

      - name: 📦 Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts --no-interaction

      # Cache du binaire Tailwind (126MB) — évite de retélécharger à chaque run
      - name: 🎨 Cache Tailwind binary
        uses: actions/cache@v4
        with:
          path: var/tailwind
          key: tailwind-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: tailwind-${{ runner.os }}-

      - name: 🎨 Build Tailwind CSS
        run: php -d memory_limit=-1 bin/console tailwind:build --minify

      - name: ⚙️ Prepare test environment
        run: |
          cp .env.test .env.test.local
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/cesizen_test?serverVersion=18&charset=utf8" >> .env.test.local

      - name: ⏳ Wait for PostgreSQL 18
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL 18..."
            sleep 1
          done

      - name: 🗄️ Setup database
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: 🎨 PHP CS Fixer (PSR-12)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --stop-on-violation

      - name: 🔍 PHPStan (level 6)
        run: vendor/bin/phpstan analyse src --level=6 --no-progress --memory-limit=256M --no-ansi --configuration=phpstan.dist.neon

      - name: 🌐 Install Chromium for Panther
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser chromium-chromedriver
          echo "PANTHER_CHROME_DRIVER_BINARY=$(which chromedriver)" >> $GITHUB_ENV
          echo "PANTHER_CHROME_BINARY=$(which chromium-browser)" >> $GITHUB_ENV

      - name: 🧪 Run PHPUnit
        run: |
          vendor/bin/phpunit \
            --coverage-text \
            --coverage-clover=coverage.xml \
            --log-junit=junit.xml \
            --testdox

      - name: 📊 Check code coverage (min 70%)
        run: |
          php -r '
            $xml = simplexml_load_file("coverage.xml");
            $metrics = $xml->project->metrics;
            $elements = (int)$metrics["elements"];
            $covered = (int)$metrics["coveredelements"];
            $pct = $elements > 0 ? round(($covered / $elements) * 100, 2) : 0;
            echo "Coverage: {$pct}%\n";
            if ($pct < 70) {
              fwrite(STDERR, "ERROR: Coverage {$pct}% is below the 70% threshold.\n");
              exit(1);
            }
            echo "OK: Coverage threshold met.\n";
          '

      - name: 📤 Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          retention-days: 7
          path: |
            coverage.xml
            junit.xml
            var/panther/