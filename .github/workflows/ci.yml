name: 🔬 CI/CD — Tests, Qualité & Docker

on:
  push:
    branches: [ "master", "develop" , "ci-cd-fix" ]
  pull_request:
    branches: [ "master", "develop" , "ci-cd-fix" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"

jobs:
  tests:
    name: 🧪 Tests (PHPUnit & Panther)
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/cesizen_test?serverVersion=18&charset=utf8"
      APP_ENV: test
      PANTHER_APP_ENV: test
      PANTHER_NO_SANDBOX: 1
      PANTHER_CHROME_ARGUMENTS: "--disable-dev-shm-usage"

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cesizen_test
          PGDATA: /var/lib/postgresql/18/docker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, intl, mbstring, xml, zip
          coverage: pcov

      - name: 📦 Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ env.PHP_VERSION }}-

      - name: 📦 Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts --no-interaction

      - name: 🎨 Cache Tailwind binary
        uses: actions/cache@v4
        with:
          path: var/tailwind
          key: tailwind-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: tailwind-${{ runner.os }}-

      - name: 🎨 Build Tailwind CSS
        run: php -d memory_limit=-1 bin/console tailwind:build --minify

      - name: 📦 Install importmap assets
        run: php bin/console importmap:install

      - name: ⚙️ Prepare test environment
        run: |
          cp .env.test .env.test.local
          echo "DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/cesizen_test?serverVersion=18&charset=utf8" >> .env.test.local
          sed -i 's|postgresql://postgres:cesizen2024@127.0.0.1:5432/cesizen|postgresql://postgres:postgres@127.0.0.1:5432/cesizen|g' .env

      - name: ⏳ Wait for PostgreSQL 18
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL 18..."
            sleep 1
          done

      - name: 🗄️ Setup database
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: 🔥 Warm up Symfony cache for PHPStan
        run: php bin/console cache:warmup --env=dev

      - name: 🎨 PHP CS Fixer (PSR-12)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --stop-on-violation --config=.php-cs-fixer.dist.php --no-interaction

      - name: 🔍 PHPStan (level 6)
        run: vendor/bin/phpstan analyse src --level=6 --no-progress --memory-limit=256M --no-ansi --configuration=phpstan.dist.neon

      - name: 🌐 Install Chromium for Panther
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser chromium-chromedriver
          echo "PANTHER_CHROME_DRIVER_BINARY=$(which chromedriver)" >> $GITHUB_ENV
          echo "PANTHER_CHROME_BINARY=$(which chromium-browser)" >> $GITHUB_ENV

      - name: 🧪 Run PHPUnit Unit Tests (with coverage)
        run: |
          vendor/bin/phpunit \
            --testsuite=unit \
            --coverage-text \
            --coverage-clover=coverage.xml \
            --log-junit=junit-unit.xml \
            --testdox

      - name: 🧪 Run PHPUnit Functional Tests (Panther)
        run: |
          vendor/bin/phpunit \
            --testsuite=functional \
            --log-junit=junit-functional.xml \
            --testdox
        env:
          PANTHER_CHROME_DRIVER_BINARY: ${{ env.PANTHER_CHROME_DRIVER_BINARY }}
          PANTHER_CHROME_BINARY: ${{ env.PANTHER_CHROME_BINARY }}

      - name: 📊 Check code coverage (min 5%)
        run: |
          php -r '
            $xml = simplexml_load_file("coverage.xml");
            $metrics = $xml->project->metrics;
            $elements = (int)$metrics["elements"];
            $covered = (int)$metrics["coveredelements"];
            $pct = $elements > 0 ? round(($covered / $elements) * 100, 2) : 0;
            echo "Coverage: {$pct}%\n";
            if ($pct < 3) {
              fwrite(STDERR, "ERROR: Coverage {$pct}% is below the 5% threshold.\n");
              exit(1);
            }
            echo "OK: Coverage threshold met.\n";
          '

      - name: 📤 Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          retention-days: 7
          path: |
            coverage.xml
            junit-unit.xml
            junit-functional.xml
            var/panther/

  # ─── Docker Build & Push (uniquement sur master après CI vert) -────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── CD : Vérification & instructions de déploiement local ──────────────────
  deploy-ready:
    name: 🚀 CD — Image prête à puller
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Vérifier que l'image est pullable
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${REPO}:latest
          echo "✅ Image pullée avec succès depuis ghcr.io"

      - name: 🧪 Smoke test — vérifier que php-fpm démarre
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker run --rm \
            -e APP_ENV=prod \
            -e APP_SECRET=smoketest_secret_not_real \
            -e DATABASE_URL="postgresql://fake:fake@localhost:5432/fake?serverVersion=18" \
            ghcr.io/${REPO}:latest \
            php -v
          echo "✅ PHP démarre correctement dans le conteneur"

      - name: 📋 Résumé du déploiement
        run: |
          echo "================================================"
          echo "🎉 CESIZen — Image Docker publiée avec succès !"
          echo "================================================"
          echo ""
          echo "📦 Images disponibles :"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "   ghcr.io/${REPO}:latest"
          echo "   ghcr.io/${REPO}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo ""
          echo "🖥️  Pour lancer le projet en local :"
          echo ""
          echo "   1. Cloner le repo :"
          echo "      git clone https://github.com/${{ github.repository }}.git"
          echo "      cd cesizen"
          echo ""
          echo "   2. Copier la config d'environnement :"
          echo "      cp .env.example .env.local"
          echo "      # (adapter les valeurs si besoin)"
          echo ""
          echo "   3. Démarrer les services :"
          echo "      docker compose pull"
          echo "      docker compose up -d"
          echo ""
          echo "   4. Initialiser la base de données :"
          echo "      docker compose exec app php bin/console doctrine:migrations:migrate --no-interaction"
          echo "      docker compose exec app php bin/console doctrine:fixtures:load --no-interaction"
          echo ""
          echo "   5. Ouvrir le navigateur :"
          echo "      http://localhost:8080"
          echo ""
          echo "   📬 Interface mail (Mailpit) :"
          echo "      http://localhost:8025"
          echo "================================================"