services:

  app:
    image: ghcr.io/marc-andy67/cesizen:latest
    build:
      context: .
      target: production
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cesizen}:${POSTGRES_PASSWORD:-cesizen}@database:5432/${POSTGRES_DB:-cesizen}?serverVersion=18&charset=utf8"
      APP_SECRET: ${APP_SECRET:-changeme_generate_a_real_secret}
    networks:
      - cesizen
  nginx:
    image: ghcr.io/marc-andy67/cesizen:nginx-latest
    build:
      context: .
      target: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - cesizen

  database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cesizen}
      POSTGRES_USER: ${POSTGRES_USER:-cesizen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cesizen}
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "${POSTGRES_DB:-cesizen}", "-U", "${POSTGRES_USER:-cesizen}" ]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - cesizen

volumes:
  database_data:


networks:
  cesizen:
    driver: bridge
